name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

# GitHub-hosted runners do not currently provide the macOS 27 / iOS 27 SDK or
# Xcode 27 beta environment required for Apple Core AI runtime validation.
# Public CI is intentionally limited to cross-platform safety checks; maintainers
# run conversion, compiler, .aimodel, and runtime integration suites locally.

jobs:
  lightweight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install -e ".[test]" build ruff twine
      - run: ruff check .
      - run: python -m compileall src tests
      - run: pytest -m "not apple and not integration"
      - run: python -m build
      - run: twine check dist/*
