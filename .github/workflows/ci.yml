name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

# NOTE: Runtime-executing parity tests require macOS 27+ and public macOS
# coreai-core wheels. Until both are available on GitHub-hosted runners, public
# CI exercises the portable Linux/package surface; maintainers should run the
# macOS runtime suite locally before releasing.

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pre-commit run --all-files
      - run: mypy --ignore-missing-imports src/coreai_onnx
      - run: vulture src/coreai_onnx tests --min-confidence 80
      # docs/coverage.md is generated from the live lowering registry;
      # regenerating must be a no-op or the table has drifted from the code.
      # (coreai-core publishes linux wheels, so the package imports here.)
      - run: python tools/gen_coverage_table.py && git diff --exit-code docs/coverage.md

  package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install build twine
      - run: python -m build --sdist --wheel
      - run: twine check dist/*
      - run: python -m pip install dist/*.whl
      - run: coreai-onnx schema --json > /tmp/coreai-onnx-schema.json

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[test]"
      # Run coverage serially: xdist plus Core AI runtime execution can race in
      # the runtime cache on macOS, while Linux skips runtime-only tests.
      - run: pytest -m "not slow" --cov=coreai_onnx --cov-report=term-missing --cov-report=xml
