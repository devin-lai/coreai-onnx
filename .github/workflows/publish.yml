name: Publish to PyPI

# Publishes to PyPI when a GitHub Release is published. Authentication is via
# PyPI Trusted Publishing (OIDC) only — no API token, username, or password.
# The Trusted Publisher must be configured on PyPI for this repository with
# workflow file `publish.yml` and environment `pypi`.
on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install build twine
      - run: python -m build --sdist --wheel
      - run: twine check dist/*
      # Smoke-test the built wheel before publishing: install it and exercise
      # the console-script entry point so a broken artifact never reaches PyPI.
      - run: python -m pip install dist/*.whl
      - run: coreai-onnx schema --json > /tmp/coreai-onnx-schema.json
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/coreai-onnx
    permissions:
      id-token: write  # PyPI trusted publishing (OIDC); no token/password
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
